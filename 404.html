<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Power Star Apps</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/mobile-nav.css">
    <link rel="stylesheet" href="css/apple-style.css">
    <style>
        .error-page {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
        }
        .error-description {
            color: #666;
            margin-bottom: 40px;
            max-width: 500px;
        }
        .error-actions a {
            display: inline-block;
            padding: 12px 30px;
            background: #ff6b6b;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            margin: 5px;
            transition: background 0.3s;
        }
        .error-actions a:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>
    <div class="color-stripe"></div>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-message">Page Not Found</h1>
        <p class="error-description">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <div class="error-actions">
            <a href="/">Go Home</a>
            <a href="/products/thermometer.html">Browse Apps</a>
        </div>
    </div>
</body>
</html>
