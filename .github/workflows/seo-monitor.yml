name: SEO Monitor

on:
  schedule:
    # Daily at 6:00 UTC - quick check with anomaly detection and cleanup
    - cron: '0 6 * * *'
    # Weekly on Monday at 8:00 UTC - full data collection
    - cron: '0 8 * * 1'
    # Monthly on 1st at 6:00 UTC - GEO citation check
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      run_daily_check:
        description: Run the daily GSC collection job
        required: false
        default: true
        type: boolean
      run_weekly_full:
        description: Run the weekly full GSC collection job
        required: false
        default: false
        type: boolean
      run_monthly_geo:
        description: Run the monthly GEO citation job
        required: false
        default: false
        type: boolean

concurrency:
  group: seo-monitor
  cancel-in-progress: false

jobs:
  validate-dispatch-selection:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure only one manual writer job is selected
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            exit 0
          fi

          selected_count=0
          [ "${{ inputs.run_daily_check }}" = "true" ] && selected_count=$((selected_count + 1))
          [ "${{ inputs.run_weekly_full }}" = "true" ] && selected_count=$((selected_count + 1))
          [ "${{ inputs.run_monthly_geo }}" = "true" ] && selected_count=$((selected_count + 1))

          if [ "$selected_count" -eq 0 ]; then
            echo "Select one workflow_dispatch job to run."
            exit 1
          fi

          if [ "$selected_count" -gt 1 ]; then
            echo "Select only one workflow_dispatch job at a time to avoid data commit conflicts."
            exit 1
          fi

  daily-check:
    runs-on: ubuntu-latest
    needs: validate-dispatch-selection
    permissions:
      contents: write
    if: github.event.schedule == '0 6 * * *' || (github.event_name == 'workflow_dispatch' && inputs.run_daily_check)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm ci --legacy-peer-deps

      - name: Check GSC secrets
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS_CONTENT: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_CONTENT }}
        run: |
          test -n "$GSC_SITE_URL" || { echo "Missing GitHub secret: GSC_SITE_URL"; exit 1; }
          test -n "$GOOGLE_APPLICATION_CREDENTIALS_CONTENT" || { echo "Missing GitHub secret: GOOGLE_APPLICATION_CREDENTIALS_CONTENT"; exit 1; }

      - name: Run GSC collector
        working-directory: scripts
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./credentials.json
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS_CONTENT: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_CONTENT }}
        run: |
          # Decode credentials from secret
          echo "$GOOGLE_APPLICATION_CREDENTIALS_CONTENT" | base64 -d > credentials.json
          npm run gsc

      - name: Detect anomalies
        working-directory: scripts
        run: npm run detect-anomalies

      - name: Cleanup history
        working-directory: scripts
        run: npm run cleanup

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: daily SEO monitoring data update"
          git pull --rebase origin main
          git push origin main

  weekly-full:
    runs-on: ubuntu-latest
    needs: validate-dispatch-selection
    permissions:
      contents: write
    if: github.event.schedule == '0 8 * * 1' || (github.event_name == 'workflow_dispatch' && inputs.run_weekly_full)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm ci --legacy-peer-deps

      - name: Check GSC secrets
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS_CONTENT: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_CONTENT }}
        run: |
          test -n "$GSC_SITE_URL" || { echo "Missing GitHub secret: GSC_SITE_URL"; exit 1; }
          test -n "$GOOGLE_APPLICATION_CREDENTIALS_CONTENT" || { echo "Missing GitHub secret: GOOGLE_APPLICATION_CREDENTIALS_CONTENT"; exit 1; }

      - name: Run GSC collector (full)
        working-directory: scripts
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ./credentials.json
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS_CONTENT: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_CONTENT }}
        run: |
          # Decode credentials from secret
          echo "$GOOGLE_APPLICATION_CREDENTIALS_CONTENT" | base64 -d > credentials.json
          npm run gsc -- --full

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: weekly SEO full data collection"
          git pull --rebase origin main
          git push origin main

  monthly-geo:
    runs-on: ubuntu-latest
    needs: validate-dispatch-selection
    permissions:
      contents: write
    if: github.event.schedule == '0 6 1 * *' || (github.event_name == 'workflow_dispatch' && inputs.run_monthly_geo)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm ci --legacy-peer-deps

      - name: Check GEO secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY" || { echo "Missing GitHub secret: OPENAI_API_KEY"; exit 1; }
          test -n "$GEMINI_API_KEY" || { echo "Missing GitHub secret: GEMINI_API_KEY"; exit 1; }

      - name: Run GEO query
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run geo

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: monthly GEO citation check"
          git pull --rebase origin main
          git push origin main
